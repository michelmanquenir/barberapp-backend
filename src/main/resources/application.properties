spring.application.name=weserv-backend

# Servidor Port
server.port=${PORT:8080}

# Configuracion de Supabase Postgres
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# HikariCP — limitar conexiones para Supabase free tier (Session mode pooler)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT — genera un secret seguro con: openssl rand -base64 64
jwt.secret=${JWT_SECRET}
# 30 días = 2592000000 ms (antes era 1 hora = 3600000)
jwt.expiration=${JWT_EXPIRATION:2592000000}

# Brevo (Sendinblue) HTTP API — no usa SMTP, funciona en Render
brevo.api.key=${BREVO_API_KEY}
brevo.api.url=https://api.brevo.com/v3/smtp/email

# Email config
mail.from.email=${MAIL_FROM_EMAIL}
mail.from.name=WeServ
resend.super-admin.email=${SUPER_ADMIN_EMAIL}

# CORS
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Logging — suprimir warning de UserDetailsService (JWT maneja auth directamente)
logging.level.org.springframework.boot.autoconfigure.security=ERROR
logging.level.org.springframework.security.config.annotation.authentication.configuration=ERROR