spring.application.name=barberiapp-backend

# Servidor Port
server.port=${PORT:8080}

# Configuracion de Supabase Postgres
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT — genera un secret seguro con: openssl rand -base64 64
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Resend Email
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL}
resend.super-admin.email=${SUPER_ADMIN_EMAIL}